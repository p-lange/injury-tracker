<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Injury Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 14px 16px;
      font-size: 13px;
    }
    h2 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 8px; }
    p { color: #aaa; line-height: 1.5; }
    .badge {
      display: inline-block;
      background: #b91c1c;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      border-radius: 4px;
      padding: 2px 6px;
      margin-right: 4px;
    }
    .tip { margin-top: 10px; }
  </style>
</head>
<body>
  <h2>⚔️ Injury Tracker</h2>
  <p>Right-click any <strong>character token</strong> and choose <em>Injuries</em> to open that token's injury sheet.</p>
  <p class="tip">
    <span class="badge">Strain</span>
    <span class="badge" style="background:#b45309">Serious</span>
    <span class="badge" style="background:#7c3aed">Critical</span>
    <span class="badge" style="background:#1e3a8a">Lethal</span>
    <span class="badge" style="background:#111">Dead</span>
  </p>
</body>
</html>
