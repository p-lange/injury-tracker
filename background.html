<!DOCTYPE html>
<html>
<head><title>Injury Tracker Background</title></head>
<body>
<script type="module">
import OBR, { buildLabel } from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2.2.0/+esm";

const EXT_ID  = "com.injury-tracker";
const EXT_KEY = "com.injury-tracker/injuries";
const LABEL_KEY = "com.injury-tracker/is-label";
const TOKEN_REF_KEY = "com.injury-tracker/token-id";
const BASE_URL = "https://p-lange.github.io/injury-tracker";

const COLORS = {
  strain:   "#16a34a",
  serious:  "#ca8a04",
  critical: "#ea580c",
  lethal:   "#dc2626",
  dead:     "#7f1d1d",
};

function getStatus(injuries) {
  if (!injuries) return null;
  if (injuries.dead) return { word: "☠ Dead", color: COLORS.dead };
  const has = (t) => (injuries[t] || []).some(s => s.desc || (s.complications || []).length > 0);
  if (has("lethal"))                   return { word: "Lethal",   color: COLORS.lethal };
  if (has("critical"))                 return { word: "Critical", color: COLORS.critical };
  if (has("serious"))                  return { word: "Wounded",  color: COLORS.serious };
  if ((injuries.strainCount ?? 0) > 0) return { word: "Strained", color: COLORS.strain };
  return null;
}

function getLabelText(injuries) {
  if (!injuries) return null;
  if (injuries.dead) return "☠ Dead";
  const status = getStatus(injuries);
  if (!status) return null;
  const sc = injuries.strainCount ?? 0;
  const sm = injuries.strainMax ?? 3;
  const pips = "●".repeat(sc) + "○".repeat(Math.max(0, sm - sc));
  const hasSevere = ["lethal","critical","serious"].some(
    t => (injuries[t]||[]).some(s => s.desc || (s.complications||[]).length > 0)
  );
  if (hasSevere && sc > 0) return `${status.word}  ${pips}`;
  if (hasSevere) return status.word;
  return pips;
}

// ── Core: sync labels as real scene.items attached to tokens ──────────
// Labels are stored in the SCENE (not local) so all players see them.
// They are found by looking for items with our LABEL_KEY metadata.

async function syncLabels(allItems) {
  const tokens = allItems.filter(i => i.layer === "CHARACTER" && i.metadata[EXT_KEY]);
  const existingLabels = allItems.filter(i => i.metadata[LABEL_KEY] === true);

  // Build lookup: tokenId -> existing label item
  const labelByToken = {};
  for (const label of existingLabels) {
    const tid = label.metadata[TOKEN_REF_KEY];
    if (tid) labelByToken[tid] = label;
  }

  const toAdd = [];
  const toUpdate = []; // { id, text, color }
  const toDelete = [];

  // Figure out what token IDs are active
  const activeTokenIds = new Set();

  for (const token of tokens) {
    const injuries = token.metadata[EXT_KEY];
    const text = getLabelText(injuries);
    const status = getStatus(injuries);
    const existing = labelByToken[token.id];

    if (!text || !status) {
      // No injury worth showing — delete label if it exists
      if (existing) toDelete.push(existing.id);
      continue;
    }

    activeTokenIds.add(token.id);

    if (existing) {
      // Check if update needed
      const currentText = existing.text?.plainText;
      const currentColor = existing.style?.backgroundColor;
      if (currentText !== text || currentColor !== status.color) {
        toUpdate.push({ id: existing.id, text, color: status.color });
      }
    } else {
      // Need to create a new label
      const dpi = await OBR.scene.grid.getDpi();
      const offset = (dpi || 150) * 0.6;

      const label = buildLabel()
        .plainText(text)
        .position({ x: token.position.x, y: token.position.y - offset })
        .attachedTo(token.id)
        .layer("TEXT")
        .locked(true)
        .visible(true)
        .fillColor("#ffffff")
        .fontSize(16)
        .fontWeight(700)
        .fontFamily("sans-serif")
        .textAlign("CENTER")
        .textAlignVertical("MIDDLE")
        .padding(6)
        .backgroundColor(status.color)
        .backgroundOpacity(0.9)
        .cornerRadius(4)
        .pointerWidth(0)
        .pointerHeight(0)
        .build();

      label.metadata[LABEL_KEY] = true;
      label.metadata[TOKEN_REF_KEY] = token.id;

      toAdd.push(label);
    }
  }

  // Also delete labels for tokens that no longer exist or have no injuries
  for (const label of existingLabels) {
    const tid = label.metadata[TOKEN_REF_KEY];
    if (!activeTokenIds.has(tid) && !toDelete.includes(label.id)) {
      toDelete.push(label.id);
    }
  }

  // Apply changes
  if (toDelete.length > 0) {
    await OBR.scene.items.deleteItems(toDelete);
  }

  if (toUpdate.length > 0) {
    await OBR.scene.items.updateItems(
      toUpdate.map(u => u.id),
      items => {
        for (const item of items) {
          const upd = toUpdate.find(u => u.id === item.id);
          if (upd) {
            item.text.plainText = upd.text;
            item.style.backgroundColor = upd.color;
          }
        }
      }
    );
  }

  if (toAdd.length > 0) {
    await OBR.scene.items.addItems(toAdd);
  }
}

let unsubItems = null;

async function initScene() {
  if (unsubItems) { unsubItems(); unsubItems = null; }
  const items = await OBR.scene.items.getItems();
  await syncLabels(items);
  unsubItems = OBR.scene.items.onChange(syncLabels);
}

OBR.onReady(async () => {

  // Context menu on CHARACTER tokens
  OBR.contextMenu.create({
    id: `${EXT_ID}/context-menu`,
    icons: [{
      icon: `${BASE_URL}/icon.svg`,
      label: "Injuries",
      filter: { every: [{ key: "layer", value: "CHARACTER" }] },
    }],
    async onClick(context, elementId) {
      const tokenId = context.items[0]?.id;
      if (!tokenId) return;
      OBR.popover.open({
        id: `${EXT_ID}/popover`,
        url: `${BASE_URL}/popover.html?tokenId=${encodeURIComponent(tokenId)}`,
        height: 500,
        width: 420,
        anchorElementId: elementId,
      });
    },
  });

  // Context menu on injury labels
  OBR.contextMenu.create({
    id: `${EXT_ID}/label-menu`,
    icons: [{
      icon: `${BASE_URL}/icon.svg`,
      label: "View Injuries",
      filter: { every: [{ key: ["metadata", LABEL_KEY], value: true }] },
    }],
    async onClick(context, elementId) {
      const tokenId = context.items[0]?.metadata?.[TOKEN_REF_KEY];
      if (!tokenId) return;
      OBR.popover.open({
        id: `${EXT_ID}/popover`,
        url: `${BASE_URL}/popover.html?tokenId=${encodeURIComponent(tokenId)}`,
        height: 500,
        width: 420,
        anchorElementId: elementId,
      });
    },
  });

  const ready = await OBR.scene.isReady();
  if (ready) await initScene();

  OBR.scene.onReadyChange(async (ready) => {
    if (ready) await initScene();
    else {
      if (unsubItems) { unsubItems(); unsubItems = null; }
    }
  });
});
</script>
</body>
</html>
