<!DOCTYPE html>
<html>
<head><title>Injury Tracker Background</title></head>
<body>
<script type="module">
import OBR, { buildLabel } from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2.2.0/+esm";

const EXT_ID  = "com.injury-tracker";
const EXT_KEY = "com.injury-tracker/injuries";
const BASE_URL = "https://p-lange.github.io/injury-tracker";

// ── Colors (matching popover) ──────────────────────────────────────────
const COLORS = {
  strain:   "#16a34a", // green
  serious:  "#ca8a04", // yellow
  critical: "#ea580c", // orange
  lethal:   "#dc2626", // red
  dead:     "#7f1d1d", // dark red
};

// ── Status from injury data ────────────────────────────────────────────
function getStatus(injuries) {
  if (!injuries) return null;
  if (injuries.dead) return { word: "☠ Dead", color: COLORS.dead };

  const has = (tier) => (injuries[tier] || []).some(s => s.desc || (s.complications||[]).length > 0);

  if (has("lethal"))   return { word: "Lethal",   color: COLORS.lethal };
  if (has("critical")) return { word: "Critical", color: COLORS.critical };
  if (has("serious"))  return { word: "Wounded",  color: COLORS.serious };
  if ((injuries.strainCount ?? 0) > 0) return { word: "Strained", color: COLORS.strain };
  return null; // healthy — no label
}

function strainPips(injuries) {
  const count = injuries?.strainCount ?? 0;
  const max   = injuries?.strainMax   ?? 3;
  return "●".repeat(count) + "○".repeat(Math.max(0, max - count));
}

function getLabelText(injuries) {
  if (!injuries) return null;
  if (injuries.dead) return "☠ Dead";
  const status = getStatus(injuries);
  if (!status) return null;

  const strainCount = injuries.strainCount ?? 0;
  const hasSevere = ["lethal","critical","serious"].some(
    t => (injuries[t]||[]).some(s => s.desc || (s.complications||[]).length > 0)
  );
  const pips = strainPips(injuries);

  if (hasSevere && strainCount > 0) return `${status.word}  ${pips}`;
  if (hasSevere) return status.word;
  return pips;
}

// ── Label sync ────────────────────────────────────────────────────────
async function syncAllLabels(items) {
  // Separate tokens with injury data from existing labels
  const tokens = items.filter(i => i.layer === "CHARACTER" && i.metadata?.[EXT_KEY]);
  const labels = items.filter(i => i.metadata?.[`${EXT_ID}/is-label`] === true);
  const labelByToken = new Map(labels.map(l => [l.metadata[`${EXT_ID}/token-id`], l]));

  for (const token of tokens) {
    const injuries = token.metadata[EXT_KEY];
    const text = getLabelText(injuries);
    const status = getStatus(injuries);
    const existing = labelByToken.get(token.id);

    if (!text) {
      // Token is healthy — remove label if exists
      if (existing) {
        await OBR.scene.items.deleteItems([existing.id]);
        labelByToken.delete(token.id);
      }
      continue;
    }

    if (existing) {
      // Update text and color only if changed
      const needsUpdate = existing.text?.plainText !== text
        || existing.style?.fillColor !== status.color;
      if (needsUpdate) {
        await OBR.scene.items.updateItems([existing.id], items => {
          for (const item of items) {
            item.text.plainText = text;
            item.style.fillColor = status.color;
          }
        });
      }
    } else {
      // Create new label, offset below the token in grid units
      const gridDpi = await OBR.scene.grid.getDpi();
      const offset = gridDpi * 0.65; // ~65% of one grid square below center

      const label = buildLabel()
        .plainText(text)
        .attachedTo(token.id)
        .layer("TEXT")
        .locked(true)
        .visible(token.visible)
        .position({
          x: token.position.x,
          y: token.position.y + offset,
        })
        .style({
          fillColor: status.color,
          fillOpacity: 0.9,
          strokeColor: "#000000",
          strokeOpacity: 0.5,
          strokeWidth: 2,
          cornerRadius: 6,
          pointerWidth: 0,
          pointerHeight: 0,
          backgroundOpacity: 0,
          backgroundColor: "#000000",
        })
        .textStyle({
          fillColor: "#ffffff",
          fontFamily: "Segoe UI",
          fontSize: 22,
          fontWeight: 700,
          textAlign: "CENTER",
          textAlignVertical: "MIDDLE",
          padding: 8,
        })
        .build();

      label.metadata[`${EXT_ID}/is-label`] = true;
      label.metadata[`${EXT_ID}/token-id`] = token.id;

      await OBR.scene.items.addItems([label]);
    }
  }

  // Clean up orphaned labels (token was deleted or lost injury data)
  const tokenIds = new Set(tokens.map(t => t.id));
  const orphans = labels.filter(l => !tokenIds.has(l.metadata[`${EXT_ID}/token-id`]));
  if (orphans.length) {
    await OBR.scene.items.deleteItems(orphans.map(l => l.id));
  }
}

// ── OBR init ──────────────────────────────────────────────────────────
OBR.onReady(async () => {

  // Right-click CHARACTER token → open injury tracker
  OBR.contextMenu.create({
    id: `${EXT_ID}/context-menu`,
    icons: [{
      icon: `${BASE_URL}/icon.svg`,
      label: "Injuries",
      filter: { every: [{ key: "layer", value: "CHARACTER" }] },
    }],
    async onClick(context, elementId) {
      const tokenId = context.items[0]?.id;
      if (!tokenId) return;
      OBR.popover.open({
        id: `${EXT_ID}/popover`,
        url: `${BASE_URL}/popover.html?tokenId=${encodeURIComponent(tokenId)}`,
        height: 500,
        width: 420,
        anchorElementId: elementId,
      });
    },
  });

  // Click/right-click the status label → open injury tracker for that token
  OBR.contextMenu.create({
    id: `${EXT_ID}/label-menu`,
    icons: [{
      icon: `${BASE_URL}/icon.svg`,
      label: "View Injuries",
      filter: { every: [{ key: ["metadata", `${EXT_ID}/is-label`], value: true }] },
    }],
    async onClick(context, elementId) {
      const label = context.items[0];
      const tokenId = label?.metadata?.[`${EXT_ID}/token-id`];
      if (!tokenId) return;
      OBR.popover.open({
        id: `${EXT_ID}/popover`,
        url: `${BASE_URL}/popover.html?tokenId=${encodeURIComponent(tokenId)}`,
        height: 500,
        width: 420,
        anchorElementId: elementId,
      });
    },
  });

  // Initial sync
  const items = await OBR.scene.items.getItems();
  await syncAllLabels(items);

  // Watch for any item changes
  OBR.scene.items.onChange(syncAllLabels);
});
</script>
</body>
</html>
