<!DOCTYPE html>
<html>
<head><title>Injury Tracker</title></head>
<body>
<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2.2.0/+esm";

const EXT_ID = "com.injury-tracker";

OBR.onReady(() => {
  OBR.contextMenu.create({
    id: `${EXT_ID}/context-menu`,
    icons: [
      {
        icon: "/icon.svg",
        label: "Injuries",
        filter: {
          every: [{ key: "layer", value: "CHARACTER" }],
        },
      },
    ],
    async onClick(context, elementId) {
      const tokenId = context.items[0]?.id;
      if (!tokenId) return;

      OBR.popover.open({
        id: `${EXT_ID}/popover`,
        url: `/popover.html?tokenId=${encodeURIComponent(tokenId)}`,
        height: 540,
        width: 420,
        anchorElementId: elementId,
      });
    },
  });
});
</script>
</body>
</html>
