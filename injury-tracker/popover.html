<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Injury Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #12121f;
      --bg2:       #1c1c30;
      --bg3:       #252540;
      --border:    #2e2e50;
      --text:      #e2e2f0;
      --muted:     #7070a0;
      --accent:    #6366f1;

      --strain:    #16a34a;
      --serious:   #d97706;
      --critical:  #9333ea;
      --lethal:    #2563eb;
      --dead:      #dc2626;

      --treated-bg: rgba(99,102,241,0.12);
      --treated-border: #6366f1;
    }

    html, body {
      width: 420px;
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px 8px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 14px;
      font-weight: 700;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .header .token-name {
      font-size: 12px;
      color: var(--muted);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Dead banner ── */
    #dead-banner {
      display: none;
      background: var(--dead);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 2px;
      text-align: center;
      padding: 5px 0;
    }
    body.is-dead #dead-banner { display: block; }

    /* ── Sections ── */
    .sections { padding: 6px 10px 10px; }

    .section-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin: 8px 0 4px;
    }
    .section-label .dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .section-label.strain .dot  { background: var(--strain); }
    .section-label.serious .dot { background: var(--serious); }
    .section-label.critical .dot{ background: var(--critical); }
    .section-label.lethal .dot  { background: var(--lethal); }
    .section-label .count { margin-left: auto; color: var(--muted); font-weight: 400; }

    /* ── Injury slots ── */
    .slot-list { display: flex; flex-direction: column; gap: 4px; }

    .slot {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 5px 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      gap: 3px 6px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .slot:hover { border-color: var(--accent); }
    .slot.treated {
      background: var(--treated-bg);
      border-color: var(--treated-border);
    }
    .slot.empty {
      opacity: 0.45;
      cursor: pointer;
    }
    .slot.empty:hover { opacity: 0.75; }

    /* severity color bar on left */
    .slot { border-left-width: 3px; }
    .slot.severity-strain   { border-left-color: var(--strain); }
    .slot.severity-serious  { border-left-color: var(--serious); }
    .slot.severity-critical { border-left-color: var(--critical); }
    .slot.severity-lethal   { border-left-color: var(--lethal); }

    .slot-desc {
      font-size: 12px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .slot.empty .slot-desc { color: var(--muted); font-style: italic; }

    .slot-complications {
      font-size: 11px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-treated-badge {
      grid-row: 1 / 3;
      grid-column: 2;
      align-self: center;
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .04em;
      border-radius: 4px;
      padding: 1px 5px;
      white-space: nowrap;
    }

    /* ── Dead toggle ── */
    .dead-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 10px 0 2px;
      padding: 6px 10px;
      border-radius: 7px;
      background: var(--bg2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: border-color .15s;
    }
    .dead-row:hover { border-color: var(--dead); }
    body.is-dead .dead-row { border-color: var(--dead); background: rgba(220,38,38,.12); }
    .dead-row span { font-weight: 700; font-size: 13px; }
    .dead-toggle {
      width: 34px; height: 18px;
      background: var(--bg3);
      border-radius: 999px;
      position: relative;
      border: 1px solid var(--border);
      transition: background .2s;
      flex-shrink: 0;
    }
    .dead-toggle::after {
      content: '';
      position: absolute;
      left: 2px; top: 2px;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: var(--muted);
      transition: left .2s, background .2s;
    }
    body.is-dead .dead-toggle { background: var(--dead); border-color: var(--dead); }
    body.is-dead .dead-toggle::after { left: 18px; background: #fff; }

    /* ── Modal overlay ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    #modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      width: 370px;
      max-width: calc(100vw - 20px);
    }
    #modal h2 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .form-group { margin-bottom: 10px; }
    label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 3px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }

    input[type="text"], textarea {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 6px 9px;
      outline: none;
      transition: border-color .15s;
      font-family: inherit;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    textarea { resize: none; height: 54px; }

    /* Complication tags */
    .tag-input-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 7px;
      min-height: 38px;
      cursor: text;
      transition: border-color .15s;
    }
    .tag-input-wrap:focus-within { border-color: var(--accent); }
    .tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 12px;
      white-space: nowrap;
    }
    .tag button {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 0; font-size: 13px; line-height: 1;
    }
    .tag button:hover { color: var(--dead); }
    #tag-input {
      border: none; background: transparent; color: var(--text);
      font-size: 12px; outline: none; min-width: 80px; flex: 1;
      font-family: inherit; padding: 1px 0;
    }

    /* Quick complication chips */
    .quick-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
    .chip {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 11px;
      padding: 2px 8px;
      cursor: pointer;
      color: var(--muted);
      transition: border-color .12s, color .12s;
    }
    .chip:hover { border-color: var(--accent); color: var(--text); }

    /* Treated checkbox row */
    .treated-row {
      display: flex; align-items: center; gap: 8px; cursor: pointer;
    }
    .treated-row input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }

    /* Clear button */
    .clear-btn {
      background: none;
      border: none;
      color: var(--dead);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      margin-left: auto;
      opacity: .7;
    }
    .clear-btn:hover { opacity: 1; }

    /* Modal buttons */
    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 14px;
    }
    button.btn {
      border: none; border-radius: 6px; font-size: 13px;
      font-weight: 600; padding: 7px 16px; cursor: pointer;
      font-family: inherit; transition: opacity .12s;
    }
    button.btn:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-cancel  { background: var(--bg3);    color: var(--muted); }
  </style>
</head>
<body>

<div id="dead-banner">☠ DEAD ☠</div>

<div class="header">
  <h1>⚔️ Injuries</h1>
  <span class="token-name" id="token-name-label">Loading…</span>
</div>

<div class="sections" id="sections">
  <!-- Dynamically rendered -->
</div>

<!-- ── Edit modal ── -->
<div id="modal-overlay">
  <div id="modal">
    <h2 id="modal-title">Edit Injury</h2>

    <div class="form-group">
      <label>Description</label>
      <input type="text" id="modal-desc" placeholder='e.g. "shot in the left leg"' maxlength="80" />
    </div>

    <div class="form-group">
      <label>Complications <span style="color:var(--muted);font-weight:400">(press Enter or comma to add)</span></label>
      <div class="tag-input-wrap" id="tag-wrap">
        <input type="text" id="tag-input" placeholder="agonized, bleeding…" />
      </div>
      <div class="quick-chips" id="quick-chips">
        <!-- injected by JS -->
      </div>
    </div>

    <div class="form-group">
      <label class="treated-row">
        <input type="checkbox" id="modal-treated" />
        Mark as Treated
      </label>
    </div>

    <div class="modal-actions">
      <button class="btn clear-btn" id="modal-clear" type="button">Clear slot</button>
      <button class="btn btn-cancel" id="modal-cancel" type="button">Cancel</button>
      <button class="btn btn-primary" id="modal-save" type="button">Save</button>
    </div>
  </div>
</div>

<script type="module">
import OBR from "https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2.2.0/+esm";

const EXT_KEY = "com.injury-tracker/injuries";

// ── Default slot configuration ──────────────────────────────────────
const SEVERITY_CONFIG = [
  { id: "strain",   label: "Strain",   defaultSlots: 3, color: "var(--strain)"   },
  { id: "serious",  label: "Serious",  defaultSlots: 2, color: "var(--serious)"  },
  { id: "critical", label: "Critical", defaultSlots: 1, color: "var(--critical)" },
  { id: "lethal",   label: "Lethal",   defaultSlots: 1, color: "var(--lethal)"   },
];

const QUICK_COMPLICATIONS = [
  "Agonized","Bleeding","Dazed","Stunned","Prone",
  "Blinded","Slowed","Weakened","Frightened","Silenced",
];

// ── State ─────────────────────────────────────────────────────────────
let tokenId = null;
let tokenName = "Unknown";
let injuries = {};   // { strain: [ {desc,complications,treated}, ... ], ...dead: bool }

// ── Helpers ───────────────────────────────────────────────────────────
function emptySlot() { return { desc: "", complications: [], treated: false }; }

function defaultInjuries() {
  const obj = { dead: false };
  for (const s of SEVERITY_CONFIG) {
    obj[s.id] = Array.from({ length: s.defaultSlots }, emptySlot);
  }
  return obj;
}

function isSlotEmpty(slot) {
  return !slot.desc && slot.complications.length === 0;
}

// ── Save to OBR ───────────────────────────────────────────────────────
async function saveInjuries() {
  await OBR.scene.items.updateItems([tokenId], items => {
    for (const item of items) {
      item.metadata[EXT_KEY] = JSON.parse(JSON.stringify(injuries));
    }
  });
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
  document.getElementById("token-name-label").textContent = tokenName;
  document.body.classList.toggle("is-dead", !!injuries.dead);

  const container = document.getElementById("sections");
  container.innerHTML = "";

  for (const sev of SEVERITY_CONFIG) {
    const slots = injuries[sev.id] || [];

    const labelEl = document.createElement("div");
    labelEl.className = `section-label ${sev.id}`;
    labelEl.innerHTML = `
      <span class="dot"></span>
      <span>${sev.label}</span>
      <span class="count">${slots.filter(s => !isSlotEmpty(s)).length}/${slots.length}</span>
    `;
    container.appendChild(labelEl);

    const listEl = document.createElement("div");
    listEl.className = "slot-list";

    slots.forEach((slot, idx) => {
      const empty = isSlotEmpty(slot);
      const slotEl = document.createElement("div");
      slotEl.className = `slot severity-${sev.id}${empty ? " empty" : ""}${slot.treated && !empty ? " treated" : ""}`;
      slotEl.innerHTML = `
        <div class="slot-desc">${empty ? "Empty — click to add injury" : escHtml(slot.desc || "Unnamed injury")}</div>
        ${!empty ? `<div class="slot-complications">${slot.complications.length ? escHtml(slot.complications.join(", ")) : '<span style="color:var(--muted);font-style:italic">no complications</span>'}</div>` : '<div class="slot-complications"></div>'}
        ${!empty && slot.treated ? '<div class="slot-treated-badge">TREATED</div>' : ''}
      `;
      slotEl.addEventListener("click", () => openModal(sev.id, idx));
      listEl.appendChild(slotEl);
    });

    container.appendChild(listEl);
  }

  // Dead row
  const deadRow = document.createElement("div");
  deadRow.className = "dead-row";
  deadRow.innerHTML = `
    <span>☠ Dead</span>
    <div class="dead-toggle"></div>
  `;
  deadRow.addEventListener("click", async () => {
    injuries.dead = !injuries.dead;
    await saveInjuries();
    render();
  });
  container.appendChild(deadRow);
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ── Modal ─────────────────────────────────────────────────────────────
let editingSev = null;
let editingIdx = null;
let pendingTags = [];

function openModal(sevId, idx) {
  editingSev = sevId;
  editingIdx = idx;
  const slot = injuries[sevId][idx];

  const sev = SEVERITY_CONFIG.find(s => s.id === sevId);
  document.getElementById("modal-title").textContent =
    `${sev.label} Injury — Slot ${idx + 1}`;

  document.getElementById("modal-desc").value = slot.desc || "";
  document.getElementById("modal-treated").checked = slot.treated || false;

  pendingTags = [...(slot.complications || [])];
  renderTags();
  buildQuickChips();

  document.getElementById("modal-overlay").classList.add("open");
  setTimeout(() => document.getElementById("modal-desc").focus(), 50);
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  editingSev = null;
  editingIdx = null;
  pendingTags = [];
}

function renderTags() {
  const wrap = document.getElementById("tag-wrap");
  // Remove old tag elements (keep the input)
  wrap.querySelectorAll(".tag").forEach(el => el.remove());
  const input = document.getElementById("tag-input");

  pendingTags.forEach((tag, i) => {
    const el = document.createElement("div");
    el.className = "tag";
    el.innerHTML = `<span>${escHtml(tag)}</span><button type="button" aria-label="remove">×</button>`;
    el.querySelector("button").addEventListener("click", () => {
      pendingTags.splice(i, 1);
      renderTags();
    });
    wrap.insertBefore(el, input);
  });
}

function buildQuickChips() {
  const container = document.getElementById("quick-chips");
  container.innerHTML = "";
  QUICK_COMPLICATIONS.forEach(comp => {
    const chip = document.createElement("button");
    chip.type = "button";
    chip.className = "chip";
    chip.textContent = comp;
    chip.addEventListener("click", () => {
      if (!pendingTags.includes(comp)) {
        pendingTags.push(comp);
        renderTags();
      }
    });
    container.appendChild(chip);
  });
}

function addTagFromInput() {
  const input = document.getElementById("tag-input");
  const vals = input.value.split(/[,;]+/).map(s => s.trim()).filter(Boolean);
  vals.forEach(v => { if (!pendingTags.includes(v)) pendingTags.push(v); });
  input.value = "";
  renderTags();
}

// tag-input events
document.getElementById("tag-input").addEventListener("keydown", e => {
  if (e.key === "Enter" || e.key === ",") { e.preventDefault(); addTagFromInput(); }
  if (e.key === "Backspace" && e.target.value === "" && pendingTags.length) {
    pendingTags.pop(); renderTags();
  }
});
document.getElementById("tag-input").addEventListener("blur", addTagFromInput);
document.getElementById("tag-wrap").addEventListener("click", () => {
  document.getElementById("tag-input").focus();
});

// Keyboard shortcut: Enter to save
document.getElementById("modal-desc").addEventListener("keydown", e => {
  if (e.key === "Enter") { e.preventDefault(); doSave(); }
});

document.getElementById("modal-save").addEventListener("click", doSave);
document.getElementById("modal-cancel").addEventListener("click", closeModal);

document.getElementById("modal-clear").addEventListener("click", async () => {
  injuries[editingSev][editingIdx] = emptySlot();
  await saveInjuries();
  closeModal();
  render();
});

document.getElementById("modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
});

async function doSave() {
  addTagFromInput(); // flush any unconfirmed tag text
  injuries[editingSev][editingIdx] = {
    desc: document.getElementById("modal-desc").value.trim(),
    complications: [...pendingTags],
    treated: document.getElementById("modal-treated").checked,
  };
  await saveInjuries();
  closeModal();
  render();
}

// ── Init ──────────────────────────────────────────────────────────────
OBR.onReady(async () => {
  const params = new URLSearchParams(window.location.search);
  tokenId = params.get("tokenId");
  if (!tokenId) {
    document.getElementById("token-name-label").textContent = "No token selected";
    return;
  }

  // Load token metadata
  const items = await OBR.scene.items.getItems([tokenId]);
  const item = items[0];
  if (!item) {
    document.getElementById("token-name-label").textContent = "Token not found";
    return;
  }

  tokenName = item.name || "Unnamed Token";
  injuries = item.metadata[EXT_KEY]
    ? JSON.parse(JSON.stringify(item.metadata[EXT_KEY]))
    : defaultInjuries();

  // Ensure we have the right slot structure (in case new severity added)
  for (const s of SEVERITY_CONFIG) {
    if (!injuries[s.id]) {
      injuries[s.id] = Array.from({ length: s.defaultSlots }, emptySlot);
    }
  }
  if (injuries.dead === undefined) injuries.dead = false;

  render();

  // Live-sync if another player edits the same token
  OBR.scene.items.onChange(updatedItems => {
    const updated = updatedItems.find(i => i.id === tokenId);
    if (updated?.metadata[EXT_KEY]) {
      injuries = JSON.parse(JSON.stringify(updated.metadata[EXT_KEY]));
      render();
    }
  });
});
</script>
</body>
</html>
